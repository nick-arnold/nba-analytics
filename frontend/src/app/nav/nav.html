<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" [routerLink]="['/']">🏀 NBA Analytics</a>
      <div class="position-relative">
        <input
          class="form-control"
          type="search"
          placeholder="Search players..."
          [(ngModel)]="searchQuery"
          (input)="onSearch()"
          (blur)="hideResults()"
        />
        @if (showResults) {
          <div class="dropdown-menu show position-absolute w-100">
            @for (player of searchResults; track player.id) {
              <button class="dropdown-item" (click)="goToPlayer(player.id)">
                {{ player.first_name }} {{ player.last_name }}
              </button>
            }
          </div>
        }
      </div>
      @if (auth.isLoggedIn()) {
        <button class="btn btn-outline-light btn-sm" (click)="logout()">Sign out</button>
      } @else {
        <a class="btn btn-outline-light btn-sm" [routerLink]="['/login']">Sign in</a>
      }
    </div>
  </nav>
