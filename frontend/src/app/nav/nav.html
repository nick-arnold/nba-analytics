<nav class="navbar" style="background:#66665e; border-bottom: 1px solid rgba(255,255,255,0.08);">
  <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center gap-2" [routerLink]="['/']">
          <img 
              src="https://hoopatlas.sfo3.cdn.digitaloceanspaces.com/static/hoopatlas-globeonly-transparentbg.png"
              alt="HoopAtlas"
              style="height: 40px; width: auto;"
          />
          <span style="font-weight: 600; font-size: 1.1rem; color: #fff;">HoopAtlas</span>
      </a>
    <div class="position-relative">
      <input
        class="form-control"
        type="search"
        placeholder="Search players..."
        [(ngModel)]="searchQuery"
        (input)="onSearch()"
        (blur)="hideResults()"
        style="background: #fff; border-color: #d8d8d4; color: #1a1a18;"
      />
      @if (showResults) {
        <div class="dropdown-menu show position-absolute w-100">
          @for (player of searchResults; track player.id) {
            <button class="dropdown-item" (click)="goToPlayer(player.slug)">
              {{ player.first_name }} {{ player.last_name }}
            </button>
          }
        </div>
      }
    </div>
    @if (auth.isLoggedIn()) {
      <button class="btn btn-sm" style="color: #fff; border: 1px solid rgba(255,255,255,0.4);" (click)="goToAccount()">Account</button>
    } @else {
      <a class="btn btn-sm" style="color: #fff; border: 1px solid rgba(255,255,255,0.4);" [routerLink]="['/login']">Sign in</a>
    }
  </div>
</nav>
