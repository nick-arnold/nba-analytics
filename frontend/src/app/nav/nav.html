<nav class="navbar bg-white border-bottom">
  <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center gap-2" [routerLink]="['/']">
          <img 
              src="https://hoopatlas.sfo3.cdn.digitaloceanspaces.com/static/hoopatlas-globeonly-transparentbg.png"
              alt="Hoop Atlas"
              style="height: 40px; width: auto;"
          />
          <span style="font-weight: 600; font-size: 1.1rem; color: #212529;">Hoop Atlas</span>
      </a>
    <div class="position-relative">
      <input
        class="form-control"
        type="search"
        placeholder="Search players..."
        [(ngModel)]="searchQuery"
        (input)="onSearch()"
        (blur)="hideResults()"
      />
      @if (showResults) {
        <div class="dropdown-menu show position-absolute w-100">
          @for (player of searchResults; track player.id) {
            <button class="dropdown-item" (click)="goToPlayer(player.slug)">
              {{ player.first_name }} {{ player.last_name }}
            </button>
          }
        </div>
      }
    </div>
    @if (auth.isLoggedIn()) {
      <button class="btn btn-outline-dark btn-sm" (click)="goToAccount()">Account</button>
    } @else {
      <a class="btn btn-outline-dark btn-sm" [routerLink]="['/login']">Sign in</a>
    }
  </div>
</nav>
