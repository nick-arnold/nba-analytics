<div class="auth-page">
    <a class="back-link" [routerLink]="['/']">← Home</a>
  
    <div class="auth-card">
      <h1>{{ mode === 'login' ? 'Sign in' : 'Create account' }}</h1>
  
      @if (error) {
        <p class="error">{{ error }}</p>
      }
  
      <div class="field">
        <label>Email</label>
        <input
          type="email"
          [(ngModel)]="email"
          placeholder="you@example.com"
          (keyup.enter)="submit()"
        />
      </div>
  
      <div class="field">
        <label>Password</label>
        <input
          type="password"
          [(ngModel)]="password"
          placeholder="••••••••"
          (keyup.enter)="submit()"
        />
      </div>
  
      <button class="submit-btn" (click)="submit()" [disabled]="loading">
        {{ loading ? 'Please wait...' : (mode === 'login' ? 'Sign in' : 'Create account') }}
      </button>
  
      <p class="toggle">
        {{ mode === 'login' ? "Don't have an account?" : 'Already have an account?' }}
        <a (click)="toggleMode()">{{ mode === 'login' ? 'Sign up' : 'Sign in' }}</a>
      </p>
    </div>
  </div>
